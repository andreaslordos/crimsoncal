name: Daily Course Data Scraper

on:
  # Schedule: Run daily at 7 AM EST/EDT
  # During EDT (March-November): 7 AM EDT = 11:00 UTC
  # During EST (November-March): 7 AM EST = 12:00 UTC
  # Using 11:00 UTC to run at 7 AM EDT, will be 6 AM EST in winter
  schedule:
    - cron: '0 11 * * *'  # Runs at 11:00 UTC daily

  # Allow manual triggering with optional term/year inputs (used by admin panel)
  workflow_dispatch:
    inputs:
      term:
        description: 'Term to scrape (Fall or Spring). Leave empty for default pipeline.'
        required: false
        default: ''
      year:
        description: 'Year to scrape (e.g. 2026). Leave empty for default pipeline.'
        required: false
        default: ''

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need full history for git operations
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scraper/requirements.txt'

      - name: Install Python dependencies
        run: |
          cd scraper
          pip install -r requirements.txt

      - name: Restore cookie authentication
        run: |
          cd scraper
          echo "${{ secrets.MY_HARVARD_COOKIE }}" > cookie.txt

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run pipeline
        env:
          INPUT_TERM: ${{ github.event.inputs.term }}
          INPUT_YEAR: ${{ github.event.inputs.year }}
        run: |
          cd scraper
          if [ -n "$INPUT_TERM" ] && [ -n "$INPUT_YEAR" ]; then
            # Admin panel triggered — scrape one specific term
            echo "Running targeted scrape for $INPUT_TERM $INPUT_YEAR"
            bash run_single_term.sh "$INPUT_TERM" "$INPUT_YEAR" --no-push
          else
            # Daily cron — scrape only the default semester (first in config.json)
            echo "Reading default semester from config.json..."
            DEFAULT_SEM=$(python3 -c "
          import json
          with open('../public/data/config.json') as f:
              config = json.load(f)
          if config['semesters']:
              term, year = config['semesters'][0]['term'].split(' ')
              print(f'{term} {year}')
          ")

            if [ -z "$DEFAULT_SEM" ]; then
              echo "No semesters in config.json, running default pipeline"
              bash run_full_pipeline.sh --no-push
            else
              read -r TERM YEAR <<< "$DEFAULT_SEM"
              echo "Scraping default semester: $TERM $YEAR"
              bash run_single_term.sh "$TERM" "$YEAR" --no-push
            fi
          fi

      - name: Update config.json after scrape
        run: |
          # Update config.json with course counts and timestamps per semester
          python3 -c "
          import json, os
          from datetime import datetime, timezone

          config_path = 'public/data/config.json'
          master_path = 'public/data/master_courses.json'
          if not os.path.exists(config_path) or not os.path.exists(master_path):
              print('Missing config.json or master_courses.json, skipping')
              exit(0)

          with open(config_path) as f:
              config = json.load(f)
          with open(master_path) as f:
              courses = json.load(f)

          now = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')

          # Count courses per semester from the single master file
          for sem in config['semesters']:
              term_parts = sem['term'].split(' ')
              if len(term_parts) == 2:
                  term_name, term_year = term_parts
                  count = sum(1 for c in courses
                      if term_name in (c.get('current_term') or c.get('year_term') or '')
                      and term_year in (c.get('current_term') or c.get('year_term') or ''))
                  sem['courseCount'] = count
                  sem['lastScraped'] = now
                  print(f\"{sem['term']}: {count} courses\")

          with open(config_path, 'w') as f:
              json.dump(config, f, indent=2)
              f.write('\n')
          "

      - name: Commit and push
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "No changes detected - data is already up to date"
          else
            git commit -m "Update course data on $(date +%Y-%m-%d)"
            git pull --rebase origin main || true
            git push
            echo "Changes committed and pushed"
          fi
