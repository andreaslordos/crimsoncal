name: Q-Guide Data Update

on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'Specific HTML file to process (e.g. QReports_2025Fall.htm). Leave empty for full run.'
        required: false
        default: ''

jobs:
  update_qguide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scraper/requirements.txt'

      - name: Install Python dependencies
        run: |
          cd scraper
          pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Q-Guide pipeline
        env:
          QGUIDE_COOKIE: ${{ secrets.QGUIDE_COOKIE }}
          INPUT_FILENAME: ${{ github.event.inputs.filename }}
        run: |
          cd scraper
          if [ -n "$INPUT_FILENAME" ]; then
            bash run_qguide_pipeline.sh "$INPUT_FILENAME"
          else
            bash run_qguide_pipeline.sh
          fi

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Show status
        if: steps.check_changes.outputs.changes == 'false'
        run: echo "No changes detected - Q-Guide data is already up to date"
